<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lorecraft</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header id="title-bar">
    <span class="logo">&#9876; LORECRAFT</span>
    <span id="connection-status" class="status-dot disconnected"></span>
  </header>

  <main id="app">
    <section id="narrative-panel">
      <div class="panel-label">&#x53D9;&#x4E8B;</div>
      <div id="narrative-content"></div>
    </section>

    <aside id="voice-panel">
      <div class="panel-label">&#x5185;&#x5FC3;&#x58F0;&#x97F3;</div>
      <div id="voice-content"></div>
    </aside>
  </main>

  <footer id="bottom-bar">
    <div id="status-bar"></div>
    <form id="input-form">
      <input type="text" id="input-box" placeholder="&#x8F93;&#x5165;&#x4F60;&#x7684;&#x884C;&#x52A8;..." autocomplete="off" disabled>
      <button type="submit" id="send-btn" disabled>&#x53D1;&#x9001;</button>
    </form>
    <div id="help-bar">
      <kbd>Enter</kbd> &#x53D1;&#x9001; &nbsp;|&nbsp; <kbd>Ctrl+S</kbd> &#x5B58;&#x6863;
    </div>
  </footer>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
